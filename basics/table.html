<!DOCTYPE html>
<html>
<head>
    <style>
        table,tr,th,td{
            border: 4px solid black; 
            border-collapse: collapse;
        }
        table{
            width: 100%;
        }
        th{
            color: blue;
        }
        td{
            color: black;
            text-align: center;
        }
        tr:nth-child(odd){
            background-color:white;
        }
        tr:nth-child(even){
            background-color: lightgrey;
        }
        th:hover, td:hover{
            background-color: pink;
        }
    </style>
</head>

<body>
    <table>
        <tr>
            <th>Name</th>
            <th>Class</th>
            <th>Section</th>

        </tr>

        <tr>
            <td>Asif</td>
            <td>BCA</td>
            <td>07</td>
        </tr>

        <tr>
            <td>Himanshu</td>
            <td>BCA</td>
            <td>07</td>
        </tr>

        <tr>
            <td>Rehan</td>
            <td>BCA</td>
            <td>08</td>
        </tr>

        <tr>
            <td>Ayan</td>
            <td>MCA</td>
            <td>09</td>
        </tr>

    </table>
</body>
</html>
